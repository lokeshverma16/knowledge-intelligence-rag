version: '3.8'

services:
  api:
    build: .
    container_name: rag_platform_api
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - chromadb_data:/app/data/chromadb
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - CHROMA_DB_DIR=/app/data/chromadb
      - ENVIRONMENT=development
    env_file:
      - .env
    depends_on:
      - chromadb
    command: python run.py # Use flask dev server to leverage hot reloading

  chromadb:
    image: chromadb/chroma:0.5.0
    container_name: chroma_backend
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma  # Persist vector dbs

volumes:
  chromadb_data:
