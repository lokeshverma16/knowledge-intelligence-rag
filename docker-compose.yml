services:
  api:
    build: .
    container_name: rag_platform_api
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      # Point the API at the chromadb service inside the compose network.
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      ENVIRONMENT: development
    depends_on:
      chromadb:
        condition: service_healthy
    volumes:
      - .:/app
    command: python run.py  # dev server -> hot reload

  chromadb:
    image: chromadb/chroma:1.5.8
    container_name: chroma_backend
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v2/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  chromadb_data:
